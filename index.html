<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<title>W-82 掃描登錄</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  :root{
    --bg:#f2f3f0; --header:#4a5e48; --card:#ffffff;
    --line:#d9ddd4; --txt:#33372f; --sub:#7a8072;
    --accent:#6b8266; --accent2:#a7b7a3; --danger:#b06a5f;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;background:var(--bg);color:var(--txt);
    font-family:-apple-system,"PingFang TC",sans-serif;}
  header{background:var(--header);color:#fff;padding:14px 16px;
    display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:5;}
  header h1{font-size:16px;margin:0;font-weight:600;}
  #count{font-size:13px;background:rgba(255,255,255,.18);padding:4px 10px;border-radius:20px;}
  .wrap{padding:16px;max-width:520px;margin:0 auto;}
  #reader{width:100%;border-radius:14px;overflow:hidden;background:#000;}
  .hint{color:var(--sub);font-size:13px;text-align:center;margin:12px 0;}
  .lastbox{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:14px;margin-top:14px;}
  .lastbox .t{font-size:12px;color:var(--sub);margin-bottom:6px;}
  .lastbox .v{font-size:15px;font-weight:600;word-break:break-all;}
  .btn{border:none;border-radius:12px;padding:14px;font-size:16px;font-weight:600;
    width:100%;color:#fff;background:var(--accent);cursor:pointer;}
  .btn:active{opacity:.85;}
  .btn.ghost{background:#fff;color:var(--txt);border:1px solid var(--line);}
  .btn.danger{background:var(--danger);}

  .modal{position:fixed;inset:0;background:rgba(30,34,28,.55);display:none;
    align-items:flex-end;justify-content:center;z-index:20;}
  .modal.show{display:flex;}
  .sheet{background:var(--card);width:100%;max-width:520px;border-radius:20px 20px 0 0;
    padding:20px 18px calc(20px + env(safe-area-inset-bottom));animation:up .18s ease;}
  @keyframes up{from{transform:translateY(40px);opacity:.4}to{transform:none;opacity:1}}
  .sheet .step{font-size:12px;color:var(--sub);}
  .sheet h2{font-size:19px;margin:6px 0 4px;}
  .sheet .barcode{font-size:13px;color:var(--sub);margin-bottom:14px;word-break:break-all;}
  .fld{width:100%;padding:14px;font-size:18px;border:1.5px solid var(--line);
    border-radius:12px;outline:none;background:#fbfcfa;}
  .fld:focus{border-color:var(--accent);}
  .fld.upper{text-transform:uppercase;}
  .row{display:flex;gap:10px;margin-top:14px;}
  .row .btn{flex:1;}
  .qty{display:flex;align-items:center;gap:14px;justify-content:center;margin:6px 0;}
  .qty button{width:52px;height:52px;border-radius:14px;border:1px solid var(--line);
    background:#fff;font-size:26px;font-weight:600;color:var(--txt);}
  .qty input{width:80px;text-align:center;font-size:26px;font-weight:700;border:none;background:none;}

  .tiles{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px;}
  .tile{padding:16px 10px;border-radius:14px;border:1.5px solid var(--line);
    background:#fbfcfa;font-size:16px;font-weight:600;text-align:center;color:var(--txt);}
  .tile:active,.tile.sel{background:var(--accent);color:#fff;border-color:var(--accent);}

  .toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%);
    background:var(--header);color:#fff;padding:12px 20px;border-radius:30px;font-size:14px;
    opacity:0;transition:.25s;z-index:40;pointer-events:none;max-width:90%;text-align:center;}
  .toast.show{opacity:1;bottom:110px;}
</style>
</head>
<body>
<header>
  <h1>W-82 掃描登錄</h1>
  <span id="count">今日 0 筆</span>
</header>

<div class="wrap">
  <div id="reader"></div>
  <div class="row" style="margin-top:10px;">
    <button class="btn ghost" id="btnTorch" style="display:none;">💡 開啟手電筒</button>
  </div>
  <p class="hint">條碼放框中央、距離約 15–25 公分，鏡頭對焦後即自動辨識。太近會對不到焦。</p>
  <div class="lastbox">
    <div class="t">上一筆</div>
    <div class="v" id="lastLine">尚無</div>
  </div>
  <div class="row" style="margin-top:14px;">
    <button class="btn ghost" id="btnManual">手動輸入單號</button>
  </div>
</div>

<div class="modal" id="modal">
  <div class="sheet" id="sheetBody"></div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   ★★★ 必改：貼上你的 Apps Script /exec 網址 ★★★
   ============================================================ */
const API_URL = 'https://script.google.com/macros/s/AKfycbxL69JQ8I0t41vSgF1xV_7iCfDHhJiK4zCW-QFHeghjj1wH-YyzUhg-zsr4VQqQxUqg/exec';

/* ====== C 磚塊選單名單（★之後替換成正式名單）====== */
const C_OPTIONS = ['範例A','範例B','範例C','範例D'];

/* ====== 狀態 ====== */
let scanner=null, scanning=false, busy=false;
let cur={ b:'', c:'', d:'', e:1, f:'', g:'' };
let step=0;
const STEPS=['b','c','e','f','g'];

/* ====== 掃描 ====== */
function startScanner(){
  scanner = new Html5Qrcode("reader", { verbose:false });
  const cfg={
    fps:10,
    // 一維條碼要「寬扁」的掃描框，跟著容器寬度自適應
    qrbox:(vw,vh)=>{ const w=Math.floor(Math.min(vw,vh*2.2)*0.92); return {width:w, height:Math.floor(w*0.42)}; },
    // 提高影像解析度，細線條碼才吃得到
    videoConstraints:{
      facingMode:"environment",
      width:{ ideal:1920 },
      height:{ ideal:1080 },
      focusMode:"continuous",
      advanced:[{focusMode:"continuous"}]
    },
    formatsToSupport:[
      Html5QrcodeSupportedFormats.CODE_128,
      Html5QrcodeSupportedFormats.CODE_39,
      Html5QrcodeSupportedFormats.EAN_13,
      Html5QrcodeSupportedFormats.EAN_8,
      Html5QrcodeSupportedFormats.ITF,
      Html5QrcodeSupportedFormats.UPC_A,
      Html5QrcodeSupportedFormats.UPC_E,
      Html5QrcodeSupportedFormats.CODABAR
    ],
    experimentalFeatures:{ useBarCodeDetectorIfSupported:true }
  };
  // 不傳 facingMode 給第一參數（改由 videoConstraints 指定），避免衝突
  scanner.start({facingMode:"environment"}, cfg, onScan, ()=>{})
    .then(()=>{ scanning=true; setupTorch(); })
    .catch(e=>{ document.getElementById('reader').innerHTML=
      '<p style="color:#fff;padding:20px;text-align:center">無法開啟相機：'+e+'<br>請確認已允許相機權限</p>'; });
}

/* 手電筒：光線不足時很有幫助 */
let torchOn=false;
function setupTorch(){
  try{
    const caps = scanner.getRunningTrackCapabilities();
    if(caps && caps.torch){
      const btn=document.getElementById('btnTorch');
      btn.style.display='block';
      btn.onclick=async()=>{
        torchOn=!torchOn;
        try{
          await scanner.applyVideoConstraints({ advanced:[{torch:torchOn}] });
          btn.textContent = torchOn ? '💡 關閉手電筒' : '💡 開啟手電筒';
        }catch(e){ toast('此裝置不支援手電筒'); }
      };
    }
  }catch(e){}
}
function pauseScan(){ if(scanner&&scanning){try{scanner.pause(true);}catch(e){}} }
function resumeScan(){ if(scanner&&scanning){try{scanner.resume();}catch(e){}} }

function onScan(text){
  if(busy) return;
  busy=true; pauseScan();
  navigator.vibrate&&navigator.vibrate(60);
  cur={ b:'', c:'', d:text.trim(), e:1, f:'', g:'' };
  step=0; renderStep();
}

/* ====== 依序彈窗 ====== */
const modal=document.getElementById('modal');
const body=document.getElementById('sheetBody');
function openModal(){ modal.classList.add('show'); }
function closeModal(){ modal.classList.remove('show'); }

function renderStep(){
  openModal();
  const key=STEPS[step];
  const stepLabel='步驟 '+(step+1)+' / 5　單號 '+cur.d;
  if(key==='b') renderInput('客戶編號','B','text',stepLabel,true);
  else if(key==='c') renderTiles(stepLabel);
  else if(key==='e') renderQty(stepLabel);
  else if(key==='f') renderInput('備註（可留空）','F','text',stepLabel,false);
  else if(key==='g') renderInput('重量','G','decimal',stepLabel,false,true);
}

function renderInput(title,label,mode,stepLabel,upper,isLast){
  body.innerHTML=`
    <div class="step">${stepLabel}</div>
    <h2>${title}</h2>
    <input class="fld ${upper?'upper':''}" id="fld" inputmode="${mode==='decimal'?'decimal':'text'}"
      ${mode==='decimal'?'':'autocapitalize="characters"'} value="${cur[STEPS[step]]||''}">
    <div class="row">
      <button class="btn ghost" onclick="cancelAll()">取消</button>
      <button class="btn" onclick="nextStep()">${isLast?'送出寫入':'下一步'}</button>
    </div>`;
  const f=document.getElementById('fld');
  setTimeout(()=>f.focus(),100);
  f.onkeydown=e=>{ if(e.key==='Enter'){e.preventDefault();nextStep();} };
}

function renderTiles(stepLabel){
  const tiles=C_OPTIONS.map(o=>
    `<div class="tile ${cur.c===o?'sel':''}" onclick="pickC(this,'${o.replace(/'/g,"\\'")}')">${o}</div>`
  ).join('');
  body.innerHTML=`
    <div class="step">${stepLabel}</div>
    <h2>日本境內物流</h2>
    <div class="tiles">${tiles}</div>
    <div class="row">
      <button class="btn ghost" onclick="cancelAll()">取消</button>
      <button class="btn" onclick="nextStep()">下一步</button>
    </div>`;
}
function pickC(el,val){
  document.querySelectorAll('.tile').forEach(t=>t.classList.remove('sel'));
  el.classList.add('sel'); cur.c=val;
}

function renderQty(stepLabel){
  body.innerHTML=`
    <div class="step">${stepLabel}</div>
    <h2>件數</h2>
    <div class="qty">
      <button onclick="chQty(-1)">−</button>
      <input id="qty" value="${cur.e}" inputmode="numeric" readonly>
      <button onclick="chQty(1)">＋</button>
    </div>
    <div class="row">
      <button class="btn ghost" onclick="cancelAll()">取消</button>
      <button class="btn" onclick="nextStep()">下一步</button>
    </div>`;
}
function chQty(d){
  cur.e=Math.max(1,(parseInt(document.getElementById('qty').value)||1)+d);
  document.getElementById('qty').value=cur.e;
}

function nextStep(){
  const key=STEPS[step];
  if(key==='b'){
    const v=document.getElementById('fld').value.trim().toUpperCase();
    if(!v){ toast('請輸入客戶編號'); return; }
    cur.b=v;
  } else if(key==='c'){
    if(!cur.c){ toast('請選擇物流'); return; }
  } else if(key==='e'){
    cur.e=parseInt(document.getElementById('qty').value)||1;
  } else if(key==='f'){
    cur.f=document.getElementById('fld').value.trim();
  } else if(key==='g'){
    const raw=document.getElementById('fld').value.trim();
    cur.g = raw===''?'':raw;
    submit(); return;
  }
  step++; renderStep();
}

/* ====== 送出（改用 fetch 呼叫 Apps Script）====== */
function submit(){
  body.innerHTML=`<div class="step">寫入中…</div><h2>請稍候</h2>
    <p class="barcode">單號 ${cur.d}</p>`;

  fetch(API_URL, {
    method:'POST',
    // text/plain 可避開 CORS 預檢（preflight），Apps Script 才收得到
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body: JSON.stringify({ action:'append', ...cur })
  })
  .then(r=>r.json())
  .then(res=>{
    if(res&&res.ok){
      document.getElementById('lastLine').textContent=
        cur.b+'　'+cur.c+'　'+cur.d+'　'+cur.e+'件　'+(cur.g||'-')+'kg';
      toast('✓ 已寫入第 '+res.row+' 列');
      if(typeof res.count==='number')
        document.getElementById('count').textContent='今日 '+res.count+' 筆';
    } else {
      toast('寫入失敗：'+((res&&res.error)||'未知'));
    }
    resetToScan();
  })
  .catch(err=>{ toast('連線失敗：'+err); resetToScan(); });
}

function resetToScan(){
  closeModal(); busy=false;
  setTimeout(resumeScan,400);
}
function cancelAll(){ resetToScan(); }

/* ====== 手動輸入單號 ====== */
document.getElementById('btnManual').onclick=()=>{
  if(busy) return;
  busy=true; pauseScan();
  cur={ b:'', c:'', d:'', e:1, f:'', g:'' };
  openModal();
  body.innerHTML=`
    <div class="step">手動輸入單號（D）</div>
    <h2>單號</h2>
    <input class="fld" id="fld" inputmode="text">
    <div class="row">
      <button class="btn ghost" onclick="cancelAll()">取消</button>
      <button class="btn" onclick="manualD()">下一步</button>
    </div>`;
  setTimeout(()=>document.getElementById('fld').focus(),100);
};
function manualD(){
  const v=document.getElementById('fld').value.trim();
  if(!v){ toast('請輸入單號'); return; }
  cur.d=v; step=0; renderStep();
}

/* ====== 小工具 ====== */
let toastT=null;
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2200);
}
function refreshCount(){
  fetch(API_URL).then(r=>r.json()).then(res=>{
    if(res&&res.ok&&typeof res.count==='number')
      document.getElementById('count').textContent='今日 '+res.count+' 筆';
  }).catch(()=>{});
}

/* ====== 啟動 ====== */
window.addEventListener('load',()=>{ startScanner(); refreshCount(); });
</script>
</body>
</html>
