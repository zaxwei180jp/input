<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<title>W-82 掃描登錄</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<style>
  :root{
    --bg:#f2f3f0; --header:#4a5e48; --card:#ffffff;
    --line:#d9ddd4; --txt:#33372f; --sub:#7a8072;
    --accent:#6b8266; --danger:#b06a5f;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;background:var(--bg);color:var(--txt);
    font-family:-apple-system,"PingFang TC",sans-serif;}
  header{background:var(--header);color:#fff;padding:14px 16px;
    display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:5;}
  header h1{font-size:16px;margin:0;font-weight:600;}
  #count{font-size:13px;background:rgba(255,255,255,.18);padding:4px 10px;border-radius:20px;}
  .wrap{padding:16px;max-width:520px;margin:0 auto;}

  .scanbox{background:var(--card);border:2px dashed var(--accent);border-radius:16px;
    padding:22px 16px;text-align:center;}
  .scanbox .icon{font-size:40px;}
  .scanbox .title{font-size:17px;font-weight:700;margin:8px 0 4px;}
  .scanbox .sub{font-size:13px;color:var(--sub);}
  #scanIn{position:absolute;opacity:0;pointer-events:none;left:-9999px;}
  .waiting{margin-top:14px;font-size:15px;color:var(--accent);font-weight:600;}

  .lastbox{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:14px;margin-top:14px;}
  .lastbox .t{font-size:12px;color:var(--sub);margin-bottom:6px;}
  .lastbox .v{font-size:15px;font-weight:600;word-break:break-all;}
  .btn{border:none;border-radius:12px;padding:14px;font-size:16px;font-weight:600;
    width:100%;color:#fff;background:var(--accent);cursor:pointer;}
  .btn:active{opacity:.85;}
  .btn.ghost{background:#fff;color:var(--txt);border:1px solid var(--line);}
  .btn.danger{background:var(--danger);}
  .row{display:flex;gap:10px;margin-top:14px;}
  .row .btn{flex:1;}

  /* 記錄列表 */
  .listhead{display:flex;justify-content:space-between;align-items:center;margin:20px 0 8px;}
  .listhead .t{font-size:15px;font-weight:700;}
  .listhead .clear{font-size:13px;color:var(--danger);background:none;border:none;}
  .rec{background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:12px 14px;margin-bottom:8px;font-size:14px;}
  .rec .top{display:flex;justify-content:space-between;gap:8px;}
  .rec .d{font-weight:700;word-break:break-all;}
  .rec .del{color:var(--danger);background:none;border:none;font-size:13px;flex:0 0 auto;}
  .rec .meta{color:var(--sub);font-size:13px;margin-top:4px;word-break:break-all;}
  .empty{color:var(--sub);font-size:14px;text-align:center;padding:20px 0;}

  .modal{position:fixed;inset:0;background:rgba(30,34,28,.55);display:none;
    align-items:flex-end;justify-content:center;z-index:20;}
  .modal.show{display:flex;}
  .sheet{background:var(--card);width:100%;max-width:520px;border-radius:20px 20px 0 0;
    padding:20px 18px calc(20px + env(safe-area-inset-bottom));animation:up .18s ease;
    max-height:88vh;overflow-y:auto;}
  @keyframes up{from{transform:translateY(40px);opacity:.4}to{transform:none;opacity:1}}
  .sheet .step{font-size:12px;color:var(--sub);}
  .sheet h2{font-size:19px;margin:6px 0 4px;}
  .fld{width:100%;padding:14px;font-size:18px;border:1.5px solid var(--line);
    border-radius:12px;outline:none;background:#fbfcfa;}
  .fld:focus{border-color:var(--accent);}
  .fld.upper{text-transform:uppercase;}
  .qty{display:flex;align-items:center;gap:14px;justify-content:center;margin:6px 0;}
  .qty button{width:52px;height:52px;border-radius:14px;border:1px solid var(--line);
    background:#fff;font-size:26px;font-weight:600;color:var(--txt);}
  .qty input{width:80px;text-align:center;font-size:26px;font-weight:700;border:none;background:none;}

  .tiles{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:6px;}
  .tile{padding:14px 6px;border-radius:12px;border:1.5px solid var(--line);
    background:#fbfcfa;font-size:14px;font-weight:600;text-align:center;color:var(--txt);
    display:flex;align-items:center;justify-content:center;min-height:52px;line-height:1.2;}
  .tile:active,.tile.sel{background:var(--accent);color:#fff;border-color:var(--accent);}

  .toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%);
    background:var(--header);color:#fff;padding:12px 20px;border-radius:30px;font-size:14px;
    opacity:0;transition:.25s;z-index:40;pointer-events:none;max-width:90%;text-align:center;}
  .toast.show{opacity:1;bottom:110px;}

  .bccard{background:#fff;border:1px solid var(--line);border-radius:12px;
    padding:10px;margin-bottom:10px;}
  .bccard .bclabel{font-size:13px;font-weight:600;text-align:center;margin-bottom:6px;color:var(--txt);}
  .bcoverlay{position:fixed;inset:0;background:#fff;z-index:60;display:none;
    flex-direction:column;align-items:center;justify-content:center;padding:20px;}
  .bcoverlay.show{display:flex;}
  .bcoverlay img{width:100%;max-width:600px;}
  .bcoverlay .lbl{font-size:16px;font-weight:700;margin-bottom:16px;}
  .bcoverlay .close{margin-top:20px;padding:14px 40px;border:none;border-radius:12px;
    background:var(--accent);color:#fff;font-size:16px;font-weight:600;}
</style>
</head>

  B: ['Q-1','C-44','C-127','C-131','D-12','D-13','ED-1','G-1','H-24','H-70','H-86','K-3','M-2','PH-101','SL-2','T-6','T-17','T-23','T-33','TIF','W-35','Y-29','Y-32','Z-7'],
  C: ['西濃','佐川','郵局','黑貓','AMAZON','ASKUL LOGIST','ファイズEC宅配','久留米運送','福山通運','T.M.G','BIC CAMERA','五大物產','名鉄','ECO','浪速','トナミ運輸','無印良品','第一貨物','JPロジスティクス','FedEx','DHL'],
  F: ['MH-86','RS-104','BW-24','TIF','客','RS-68']
};
const LISTS_KEY = 'w82_tile_lists';

function loadLists(){
  try{
    const saved=JSON.parse(localStorage.getItem(LISTS_KEY)||'null');
    if(saved && Array.isArray(saved.B) && Array.isArray(saved.C) && Array.isArray(saved.F)) return saved;
  }catch(e){}
  return JSON.parse(JSON.stringify(DEFAULT_LISTS));
}
function saveLists(l){ try{ localStorage.setItem(LISTS_KEY, JSON.stringify(l)); }catch(e){} }
let LISTS = loadLists();

/* 取用時的別名（動態） */
function B_OPTIONS(){ return LISTS.B; }
function C_OPTIONS(){ return LISTS.C; }
function F_OPTIONS(){ return LISTS.F; }

const STORE_KEY = 'w82_scan_records';

let busy=false;
let cur={ b:'', c:'', d:'', e:1, f:'', g:'' };
let step=0;
const STEPS=['b','c','e','f','g'];

/* ====== 本機儲存 ====== */
function loadRecords(){
  try{ return JSON.parse(localStorage.getItem(STORE_KEY)||'[]'); }
  catch(e){ return []; }
}
function saveRecords(arr){
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(arr)); }catch(e){ toast('儲存失敗：'+e); }
}
function addRecord(rec){
  const arr=loadRecords();
  arr.push(rec);
  saveRecords(arr);
  renderList();
}
function delRecord(id){
  let arr=loadRecords();
  arr=arr.filter(r=>r.id!==id);
  saveRecords(arr);
  renderList();
}
function clearAll(){
  const arr=loadRecords();
  const unsynced=arr.filter(r=>!r.synced).length;
  const msg = unsynced>0
    ? '注意：還有 '+unsynced+' 筆尚未同步到 Sheet！確定要清空全部？'
    : '確定清空所有記錄？（已全部同步到 Sheet）';
  if(!confirm(msg)) return;
  saveRecords([]);
  renderList();
  toast('已清空');
}

/* ====== 背景同步到 Google Sheet ====== */
let syncing=false;
function syncNow(){
  if(syncing) return;
  const arr=loadRecords();
  const pending=arr.filter(r=>!r.synced);
  if(pending.length===0) return;
  syncing=true;
  setSyncStatus('同步中…');

  fetch('/api/sheet', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ records: pending })
  })
  .then(r=>r.json())
  .then(res=>{
    if(res && res.ok){
      // 標記已同步
      const ids=new Set(pending.map(r=>r.id));
      const updated=loadRecords().map(r=> ids.has(r.id) ? {...r, synced:true} : r);
      saveRecords(updated);
      renderList();
      setSyncStatus('');
      toast('✓ 已同步 '+res.written+' 筆到 Sheet');
    } else {
      setSyncStatus('同步失敗，稍後自動重試');
    }
  })
  .catch(()=>{ setSyncStatus('離線，稍後自動重試'); })
  .finally(()=>{ syncing=false; });
}
function setSyncStatus(msg){
  const el=document.getElementById('syncStatus');
  if(el) el.textContent=msg;
}
/* 每 30 秒自動重試未同步的 */
setInterval(syncNow, 30000);
/* 網路恢復時立即同步 */
window.addEventListener('online', syncNow);

/* 今天日期 YYYY/MM/DD */
function todayStr(){
  const d=new Date();
  const p=n=>String(n).padStart(2,'0');
  return d.getFullYear()+'/'+p(d.getMonth()+1)+'/'+p(d.getDate());
}

/* ====== 列表顯示 ====== */
function renderList(){
  const arr=loadRecords();
  const unsynced=arr.filter(r=>!r.synced).length;
  document.getElementById('count').textContent=
    '共 '+arr.length+' 筆'+(unsynced>0?'（'+unsynced+' 待同步）':'');
  const box=document.getElementById('list');
  if(arr.length===0){ box.innerHTML='<div class="empty">尚無記錄。掃描後會顯示在這裡。</div>'; return; }
  // 最新的在最上面
  box.innerHTML = arr.slice().reverse().map(r=>`
    <div class="rec">
      <div class="top">
        <span class="d">${r.synced?'✅':'⏳'} ${esc(r.d)}</span>
        <button class="del" onclick="delRecord('${r.id}')">刪除</button>
      </div>
      <div class="meta">${esc(r.b)}｜${esc(r.c)}｜${r.e}件｜${r.g===''?'-':r.g}kg${r.f?'｜'+esc(r.f):''}</div>
    </div>`).join('');
}
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* ====== 複製全部（TSV，貼到 Sheet 自動分欄）====== */
function copyAll(){
  const arr=loadRecords();
  if(arr.length===0){ toast('沒有記錄可複製'); return; }
  // 欄位順序：A日期 B客編 C物流 D單號 E件數 F備註 G重量 H出貨(空)
  const lines = arr.map(r=>[r.date, r.b, r.c, r.d, r.e, r.f, r.g, ''].join('\t'));
  const tsv = lines.join('\n');

  // 優先用 Clipboard API，失敗則用備援
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(tsv)
      .then(()=>toast('✓ 已複製 '+arr.length+' 筆，去 Sheet 貼上'))
      .catch(()=>fallbackCopy(tsv, arr.length));
  } else {
    fallbackCopy(tsv, arr.length);
  }
}
function fallbackCopy(text, n){
  const ta=document.createElement('textarea');
  ta.value=text; ta.style.position='fixed'; ta.style.left='-9999px';
  document.body.appendChild(ta); ta.focus(); ta.select();
  try{ document.execCommand('copy'); toast('✓ 已複製 '+n+' 筆，去 Sheet 貼上'); }
  catch(e){ toast('複製失敗，請長按下方文字手動複製'); showManualCopy(text); }
  document.body.removeChild(ta);
}
function showManualCopy(text){
  openModal();
  body.innerHTML=`<div class="step">自動複製失敗，請長按全選複製</div>
    <h2>手動複製</h2>
    <textarea class="fld" style="height:200px" readonly>${esc(text)}</textarea>
    <div class="row"><button class="btn" onclick="cancelAll()">關閉</button></div>`;
}

/* ====== 掃描槍輸入 ====== */
const scanIn=document.getElementById('scanIn');
function focusScan(){ if(!busy){ scanIn.focus({preventScroll:true}); } }
function cleanCode(s){ return s.replace(/\s+/g,'').trim(); }

let bufTimer=null;
scanIn.addEventListener('keydown', e=>{
  if(e.key==='Enter'){
    e.preventDefault();
    clearTimeout(bufTimer);
    const code=cleanCode(scanIn.value);
    scanIn.value='';
    if(code) onScan(code);
  }
});
scanIn.addEventListener('input', ()=>{
  // 已在流程中就不再接收（避免掃碼殘字跑進欄位）
  if(busy){ scanIn.value=''; return; }
  clearTimeout(bufTimer);
  // 緩衝拉長到 500ms：掃碼器讀慢時不會被中途切斷
  bufTimer=setTimeout(()=>{
    const code=cleanCode(scanIn.value);
    if(code.length>=4){ scanIn.value=''; onScan(code); }
  },500);
});

function onScan(text){
  if(busy) return;
  busy=true;
  navigator.vibrate&&navigator.vibrate(60);
  cur={ b:'', bManual:'', c:'', d:cleanCode(text), e:1, f:'', fManual:'', g:'' };
  step=0; renderStep();
}

/* ====== 依序彈窗 ====== */
const modal=document.getElementById('modal');
const body=document.getElementById('sheetBody');
function openModal(){ scanIn.blur(); modal.classList.add('show'); }
function closeModal(){ modal.classList.remove('show'); }

function renderStep(){
  openModal();
  const key=STEPS[step];
  const stepLabel='步驟 '+(step+1)+' / 5　單號 '+cur.d;
  if(key==='b') renderBTiles(stepLabel);
  else if(key==='c') renderTiles(stepLabel);
  else if(key==='e') renderQty(stepLabel);
  else if(key==='f') renderNote(stepLabel);
  else if(key==='g') renderInput('重量','decimal',stepLabel,false,true);
}

/* 上一步：回到前一個欄位；在第一步則取消整筆 */
function prevStep(){
  if(step<=0){ cancelAll(); return; }
  step--; renderStep();
}

/* B 客編：常用磚塊 + 底部手動輸入 */
function renderBTiles(stepLabel){
  const tiles=B_OPTIONS().map(o=>
    `<div class="tile ${cur.b===o?'sel':''}" onclick="pickB('${o.replace(/'/g,"\\'")}')">${o}</div>`
  ).join('');
  body.innerHTML=`
    <div class="step">${stepLabel}</div>
    <h2>客戶編號</h2>
    <div class="tiles">${tiles}</div>
    <div style="font-size:13px;color:var(--sub);margin:14px 0 6px;">或手動輸入（自動大寫）</div>
    <input class="fld upper" id="fld" inputmode="text" autocapitalize="characters" placeholder="點這裡輸入" value="${cur.bManual||''}">
    <div class="row">
      <button class="btn ghost" onclick="prevStep()">上一步</button>
      <button class="btn" onclick="nextStep()">下一步</button>
    </div>`;
  const f=document.getElementById('fld');
  f.addEventListener('touchend',()=>{ f.focus(); },{passive:true});
  f.oninput=()=>{
    document.querySelectorAll('.tile').forEach(t=>t.classList.remove('sel'));
    cur.b=''; cur.bManual=f.value;
  };
  f.onkeydown=e=>{ if(e.key==='Enter'){e.preventDefault();nextStep();} };
}
/* 點磚塊直接進下一步 */
function pickB(val){
  cur.b=val; cur.bManual='';
  step++; renderStep();
}

/* F 備註：常用磚塊 + 底部手動輸入，不自動彈鍵盤，可留空 */
function renderNote(stepLabel){
  const tiles=F_OPTIONS().map(o=>
    `<div class="tile ${cur.f===o?'sel':''}" onclick="pickF('${o.replace(/'/g,"\\'")}')">${o}</div>`
  ).join('');
  body.innerHTML=`
    <div class="step">${stepLabel}</div>
    <h2>備註（可留空）</h2>
    <div class="tiles">${tiles}</div>
    <div style="font-size:13px;color:var(--sub);margin:14px 0 6px;">或手動輸入（自動大寫）</div>
    <input class="fld upper" id="fld" inputmode="text" autocapitalize="characters" placeholder="免填，需要才點這裡輸入" value="${cur.fManual||''}">
    <div class="row">
      <button class="btn ghost" onclick="prevStep()">上一步</button>
      <button class="btn" onclick="nextStep()">下一步（免填直接按）</button>
    </div>`;
  const f=document.getElementById('fld');
  f.addEventListener('touchend',()=>{ f.focus(); },{passive:true});
  f.oninput=()=>{
    document.querySelectorAll('.tile').forEach(t=>t.classList.remove('sel'));
    cur.f=''; cur.fManual=f.value;
  };
  f.onkeydown=e=>{ if(e.key==='Enter'){e.preventDefault();nextStep();} };
}
/* 點磚塊直接進下一步 */
function pickF(val){
  cur.f=val; cur.fManual='';
  step++; renderStep();
}

function renderInput(title,mode,stepLabel,upper,isLast){
  body.innerHTML=`
    <div class="step">${stepLabel}</div>
    <h2>${title}</h2>
    <input class="fld ${upper?'upper':''}" id="fld" inputmode="${mode==='decimal'?'decimal':'text'}"
      ${mode==='decimal'?'':'autocapitalize="characters"'} placeholder="${mode==='decimal'?'輸入重量（可小數）':'點這裡輸入'}" value="${cur[STEPS[step]]||''}">
    <button class="btn ghost" style="margin-top:10px;" onclick="document.getElementById('fld').focus();document.getElementById('fld').click();">⌨️ 叫出數字鍵盤</button>
    <div class="row">
      <button class="btn ghost" onclick="prevStep()">上一步</button>
      <button class="btn" onclick="nextStep()">${isLast?'儲存這筆':'下一步'}</button>
    </div>`;
  const f=document.getElementById('fld');
  // 嘗試自動聚焦叫出鍵盤（掃描器連著時 iOS 可能不彈，用上面的按鈕手動叫出）
  setTimeout(()=>{ try{ f.focus({preventScroll:true}); f.click(); }catch(e){} },200);
  f.addEventListener('touchend',()=>{ f.focus(); },{passive:true});
  f.onkeydown=e=>{ if(e.key==='Enter'){e.preventDefault();nextStep();} };
}

function renderTiles(stepLabel){
  const tiles=C_OPTIONS().map(o=>
    `<div class="tile ${cur.c===o?'sel':''}" onclick="pickC('${o.replace(/'/g,"\\'")}')">${o}</div>`
  ).join('');
  body.innerHTML=`
    <div class="step">${stepLabel}</div>
    <h2>日本境內物流</h2>
    <div class="tiles">${tiles}</div>
    <div class="row">
      <button class="btn ghost" onclick="prevStep()">上一步</button>
      <button class="btn" onclick="nextStep()">下一步</button>
    </div>`;
}
/* 點磚塊直接進下一步 */
function pickC(val){
  cur.c=val;
  step++; renderStep();
}

function renderQty(stepLabel){
  body.innerHTML=`
    <div class="step">${stepLabel}</div>
    <h2>件數</h2>
    <div class="qty">
      <button onclick="chQty(-1)">−</button>
      <input id="qty" value="${cur.e}" inputmode="numeric" readonly>
      <button onclick="chQty(1)">＋</button>
    </div>
    <div class="row">
      <button class="btn ghost" onclick="prevStep()">上一步</button>
      <button class="btn" onclick="nextStep()">下一步</button>
    </div>`;
}
function chQty(d){
  cur.e=Math.max(1,(parseInt(document.getElementById('qty').value)||1)+d);
  document.getElementById('qty').value=cur.e;
}

function nextStep(){
  const key=STEPS[step];
  if(key==='b'){
    // 磚塊已選就用 cur.b；否則用手動輸入框
    const f=document.getElementById('fld');
    const manual=f?f.value.trim().toUpperCase():'';
    const v = cur.b || manual;
    if(!v){ toast('請選擇或輸入客戶編號'); return; }
    cur.b=v;
  } else if(key==='c'){
    if(!cur.c){ toast('請選擇物流'); return; }
  } else if(key==='e'){
    cur.e=parseInt(document.getElementById('qty').value)||1;
  } else if(key==='f'){
    const f=document.getElementById('fld');
    const manual=f?f.value.trim().toUpperCase():'';
    cur.f = cur.f || manual;  // 磚塊優先，否則手動；都沒有就留空
  } else if(key==='g'){
    const raw=document.getElementById('fld').value.trim();
    cur.g = raw===''?'':raw;
    saveThis(); return;
  }
  step++; renderStep();
}

/* ====== 儲存這筆 ====== */
function saveThis(){
  const rec={
    id: 'r'+Date.now()+Math.floor(Math.random()*1000),
    date: todayStr(),
    b: cur.b, c: cur.c, d: cur.d, e: cur.e, f: cur.f, g: cur.g,
    synced: false
  };
  addRecord(rec);
  toast('✓ 已儲存（共 '+loadRecords().length+' 筆）');
  resetToScan();
  syncNow();  // 立即背景同步到 Sheet
}

function resetToScan(){
  closeModal(); busy=false;
  scanIn.value='';
  setTimeout(focusScan,300);
}
function cancelAll(){ resetToScan(); }

/* ====== 手動輸入單號 ====== */
document.getElementById('btnManual').onclick=()=>{
  if(busy) return;
  busy=true;
  cur={ b:'', bManual:'', c:'', d:'', e:1, f:'', fManual:'', g:'' };
  openModal();
  body.innerHTML=`
    <div class="step">手動輸入單號（D）</div>
    <h2>單號</h2>
    <input class="fld" id="fld" inputmode="text" placeholder="點這裡輸入">
    <div class="row">
      <button class="btn ghost" onclick="cancelAll()">取消</button>
      <button class="btn" onclick="manualD()">下一步</button>
    </div>`;
  setTimeout(()=>document.getElementById('fld').focus(),100);
};
function manualD(){
  const v=document.getElementById('fld').value.trim();
  if(!v){ toast('請輸入單號'); return; }
  cur.d=v; step=0; renderStep();
}

/* ====== 按鈕綁定 ====== */
document.getElementById('btnCopy').onclick=copyAll;
document.getElementById('btnClear').onclick=clearAll;

/* ====== ⚙️ 設定：管理磚塊清單 ====== */
let settingTab='B';
document.getElementById('btnSettings').onclick=()=>{
  if(busy) return;
  busy=true;
  settingTab='B';
  renderSettings();
};
function renderSettings(){
  openModal();
  const tabs=[['B','客戶編號'],['C','物流'],['F','備註']];
  const tabHtml=tabs.map(([k,label])=>
    `<button onclick="switchTab('${k}')" style="flex:1;padding:10px;border:none;border-radius:10px;font-size:14px;font-weight:600;
      background:${settingTab===k?'var(--accent)':'#fff'};color:${settingTab===k?'#fff':'var(--txt)'};
      border:1px solid var(--line);">${label}</button>`).join('');
  const items=LISTS[settingTab].map((o,i)=>`
    <div style="display:flex;align-items:center;gap:6px;background:#fbfcfa;border:1px solid var(--line);border-radius:10px;padding:8px 10px;margin-bottom:6px;">
      <span style="flex:1;font-size:15px;font-weight:600;word-break:break-all;">${esc(o)}</span>
      <button onclick="moveItem(${i},-1)" style="border:1px solid var(--line);background:#fff;border-radius:8px;width:34px;height:34px;font-size:16px;">↑</button>
      <button onclick="moveItem(${i},1)" style="border:1px solid var(--line);background:#fff;border-radius:8px;width:34px;height:34px;font-size:16px;">↓</button>
      <button onclick="removeItem(${i})" style="border:none;background:none;color:var(--danger);font-size:14px;padding:0 6px;">刪除</button>
    </div>`).join('');
  body.innerHTML=`
    <div class="step">⚙️ 磚塊清單管理（存於本機，改完立即生效）</div>
    <div style="display:flex;gap:8px;margin:10px 0;">${tabHtml}</div>
    <div style="max-height:38vh;overflow-y:auto;">${items||'<div class="empty">清單是空的</div>'}</div>
    <div style="display:flex;gap:8px;margin-top:10px;">
      <input class="fld upper" id="newItem" placeholder="輸入新項目" style="flex:1;" autocapitalize="characters">
      <button class="btn" style="width:auto;padding:14px 18px;" onclick="addItem()">新增</button>
    </div>
    <div class="row">
      <button class="btn ghost" onclick="resetDefault()">還原預設</button>
      <button class="btn" onclick="closeSettings()">完成</button>
    </div>`;
  const inp=document.getElementById('newItem');
  inp.onkeydown=e=>{ if(e.key==='Enter'){e.preventDefault();addItem();} };
}
function switchTab(k){ settingTab=k; renderSettings(); }
function moveItem(i,dir){
  const arr=LISTS[settingTab];
  const j=i+dir;
  if(j<0||j>=arr.length) return;
  [arr[i],arr[j]]=[arr[j],arr[i]];
  saveLists(LISTS); renderSettings();
}
function removeItem(i){
  const arr=LISTS[settingTab];
  if(!confirm('刪除「'+arr[i]+'」？')) return;
  arr.splice(i,1);
  saveLists(LISTS); renderSettings();
}
function addItem(){
  const inp=document.getElementById('newItem');
  const v=inp.value.trim().toUpperCase();
  if(!v){ toast('請輸入內容'); return; }
  if(LISTS[settingTab].includes(v)){ toast('已存在'); return; }
  LISTS[settingTab].push(v);
  saveLists(LISTS);
  renderSettings();
  toast('已新增 '+v);
}
function resetDefault(){
  if(!confirm('將「'+({B:'客戶編號',C:'物流',F:'備註'})[settingTab]+'」清單還原成預設？')) return;
  LISTS[settingTab]=JSON.parse(JSON.stringify(DEFAULT_LISTS[settingTab]));
  saveLists(LISTS); renderSettings();
}
function closeSettings(){ resetToScan(); }

/* ====== 掃描槍設定條碼 ====== */
function toggleBarcodes(){
  const area=document.getElementById('barcodeArea');
  const btn=document.getElementById('btnBarcodes');
  const open = area.style.display==='none';
  area.style.display = open?'block':'none';
  btn.textContent = open?'🔧 掃描槍設定條碼 ▴':'🔧 掃描槍設定條碼 ▾';
}
const BC_LABELS={ bt:'Bluetooth Mode（藍牙模式）', clear:'Clear Pairing（清除配對）', wireless:'One-to-One Pairing（Wireless）' };
function zoomBarcode(key){
  // 從對應卡片的 img 取來源
  const cards=document.querySelectorAll('#barcodeArea .bccard');
  let src='';
  cards.forEach(c=>{ if(c.getAttribute('onclick').includes("'"+key+"'")) src=c.querySelector('img').src; });
  document.getElementById('bcimg').src=src;
  document.getElementById('bclbl').textContent=BC_LABELS[key]||'';
  document.getElementById('bcoverlay').classList.add('show');
}
function closeZoom(){ document.getElementById('bcoverlay').classList.remove('show'); }

/* ====== 小工具 ====== */
let toastT=null;
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2200);
}

document.addEventListener('click', ()=>{ if(!busy && !modal.classList.contains('show')) focusScan(); });

window.addEventListener('load',()=>{ focusScan(); renderList(); syncNow(); });
</script>
</body>
</html>
